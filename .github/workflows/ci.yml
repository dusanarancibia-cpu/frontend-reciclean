name: CI

# Build de estilos + tests unitarios en cada push a main y en cada PR.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build:css   # el único "build" del sitio estático
      - run: npm test            # node:test sobre el motor de precios (formula.js)
