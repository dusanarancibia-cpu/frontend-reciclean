<!-- VISTA · Vitrina pública. Qué material muestra cada web (Farex / Reciclean).
     El precio es el mismo para ambas; aquí solo se elige QUÉ se publica.
     Los IDs los consume /controllers/vitrinaController.js. -->
<section class="max-w-5xl mx-auto p-4 md:p-6">
  <header class="mb-4 flex flex-wrap items-start justify-between gap-3">
    <div>
      <h2 class="text-2xl font-bold text-stone-800 flex items-center gap-2"><span>🌐</span><span>Vitrina pública</span></h2>
      <p class="text-sm text-stone-500 mt-1">
        Marca qué materiales aparecen en cada web. El precio publicado es el mismo en ambas;
        aquí solo decides <b>qué se muestra</b>.
      </p>
    </div>
    <span id="vitRolChip" class="chip off">cargando…</span>
  </header>

  <div id="vitAviso" class="hidden mb-4 rounded-lg px-4 py-3 text-sm bg-amber-50 text-amber-800 border border-amber-200"></div>

  <div class="bg-white border border-stone-300 rounded-lg p-3 mb-4 flex flex-wrap items-center gap-2">
    <input id="vitBuscar" type="search" placeholder="Buscar material…"
      class="border border-stone-300 rounded px-3 py-1.5 text-sm flex-1 min-w-[180px]">
    <span id="vitResumen" class="text-xs text-stone-500"></span>
  </div>

  <div class="bg-white border border-stone-300 rounded-lg overflow-x-auto">
    <table class="w-full text-sm">
      <thead id="vitHead" class="bg-stone-50 text-stone-500 text-xs uppercase tracking-wider select-none">
        <tr>
          <th class="text-left px-4 py-2.5" data-sort="material">Material</th>
          <th class="text-right px-4 py-2.5" data-sort="precio">Precio</th>
          <th class="text-center px-4 py-2.5">En web FAREX</th>
          <th class="text-center px-4 py-2.5">En web Reciclean</th>
        </tr>
      </thead>
      <tbody id="vitBody" class="divide-y divide-stone-100">
        <tr><td colspan="4" class="px-4 py-8 text-center text-stone-400">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
  <div id="vitPager"></div>
  <p class="text-xs text-stone-500 mt-3" id="vitInfo"></p>
</section>
