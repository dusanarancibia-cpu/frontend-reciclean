<!-- VISTA · Pendientes. Precios revisados esperando aprobación de gerencia.
     Los IDs los consume /controllers/pendientesController.js. -->
<section class="max-w-6xl mx-auto p-4 md:p-6">
  <header class="mb-4 flex flex-wrap items-start justify-between gap-3">
    <div>
      <h2 class="text-2xl font-bold text-stone-800 flex items-center gap-2"><span>⏳</span><span>Pendientes</span></h2>
      <p class="text-sm text-stone-500 mt-1">
        Precios revisados que esperan aprobación. Gerencia asigna la <b>sucursal</b> y define
        el <b>precio a publicar</b> antes de que salgan a la web.
      </p>
    </div>
    <span id="penRolChip" class="chip off">cargando…</span>
  </header>

  <div id="penAviso" class="hidden mb-4 rounded-lg px-4 py-3 text-sm bg-amber-50 text-amber-800 border border-amber-200"></div>

  <div class="bg-white border border-stone-300 rounded-lg p-3 mb-4 flex flex-wrap items-center gap-2">
    <input id="penBuscar" type="search" placeholder="Buscar por material, quien cargó, origen…"
      class="border border-stone-300 rounded px-3 py-1.5 text-sm flex-1 min-w-[200px]">
    <button id="penDescartar" class="bg-white border border-rose-300 text-rose-700 px-3 py-1.5 rounded text-sm font-medium">Descartar seleccionados</button>
    <span id="penResumen" class="text-xs text-stone-500"></span>
  </div>

  <div class="bg-white border border-stone-300 rounded-lg overflow-x-auto">
    <table class="w-full text-sm">
      <thead id="penHead" class="bg-stone-50 text-stone-500 text-xs uppercase tracking-wider select-none">
        <tr>
          <th class="px-3 py-2.5"><input type="checkbox" id="penTodos" title="Seleccionar todo"></th>
          <th class="text-left px-4 py-2.5" data-sort="material">Material</th>
          <th class="text-right px-4 py-2.5" data-sort="recibido">Precio recibido</th>
          <th class="text-left px-4 py-2.5" data-sort="vigencia">Vigencia</th>
          <th class="text-left px-4 py-2.5" data-sort="origen">Origen</th>
          <th class="text-left px-4 py-2.5" data-sort="creado">Cargado por</th>
          <th class="text-right px-4 py-2.5">Acción</th>
        </tr>
      </thead>
      <tbody id="penBody" class="divide-y divide-stone-100">
        <tr><td colspan="7" class="px-4 py-8 text-center text-stone-400">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
  <div id="penPager"></div>
  <p class="text-xs text-stone-500 mt-3" id="penInfo"></p>
</section>
