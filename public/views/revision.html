<!-- VISTA · Revisión (stub). Precios calculados pendientes de aprobación.
     Checkbox por fila + confirmar 1 a 1 o en lote. Aprobar → precio-aplicar (futuro). -->
<section class="max-w-5xl mx-auto p-4 md:p-6">
  <header class="mb-4 flex flex-wrap items-center justify-between gap-3">
    <div>
      <h2 class="text-2xl font-bold text-stone-800 flex items-center gap-2"><span>✅</span><span>Aprobación Final</span></h2>
      <p class="text-sm text-stone-500 mt-1">Precios calculados pendientes de aprobar. Marca los que confirmas: al confirmar se publican como precio oficial en la web.</p>
    </div>
    <button id="btnConfirmarSel" class="bg-emerald-700 hover:bg-emerald-800 text-white px-4 py-2 rounded text-sm font-medium disabled:opacity-50" disabled>
      Confirmar seleccionados (<span id="revSelCount">0</span>)
    </button>
  </header>

  <div class="bg-white border border-stone-300 rounded-lg overflow-hidden">
    <table class="w-full text-sm">
      <thead id="revisionHead" class="bg-stone-50 text-stone-500 text-xs uppercase tracking-wider select-none">
        <tr>
          <th class="px-4 py-2.5 w-10"><input type="checkbox" id="revSelAll" aria-label="Seleccionar todo"></th>
          <th class="text-left px-4 py-2.5" data-sort="material">Material</th>
          <th class="text-left px-4 py-2.5" data-sort="sucursal">Sucursal</th>
          <th class="text-right px-4 py-2.5" data-sort="precio_clp_kg">P. Lista Nuevo</th>
          <th class="text-right px-4 py-2.5" data-sort="precio_actual">P. Lista Actual</th>
          <th class="text-right px-4 py-2.5">Confirmar</th>
        </tr>
      </thead>
      <tbody id="revisionBody" class="divide-y divide-stone-100">
        <tr><td colspan="6" class="px-4 py-8 text-center text-stone-400">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
  <div id="revisionPager"></div>
  <p class="text-xs text-stone-500 mt-3" id="revisionInfo"></p>
</section>
