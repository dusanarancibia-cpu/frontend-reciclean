<!-- VISTA · Recibidos. Datos crudos capturados por Diego desde imágenes (datos reales).
     Fuente: staging.precios_propuestos (orden created_at DESC). -->
<section class="max-w-5xl mx-auto p-4 md:p-6">
  <header class="mb-4">
    <h2 class="text-2xl font-bold text-stone-800 flex items-center gap-2"><span>📥</span><span>Recibidos</span></h2>
    <p class="text-sm text-stone-500 mt-1">Precios recién recibidos (de Diego o de Carga manual), en orden de llegada. Presiona <b>🧮 Calcular</b> para procesarlos.</p>
  </header>

  <div class="bg-white border border-stone-300 rounded-lg overflow-x-auto">
    <table class="w-full text-sm">
      <thead id="recibidosHead" class="bg-stone-50 text-stone-500 text-xs uppercase tracking-wider select-none">
        <tr>
          <th class="text-left px-4 py-2.5" data-sort="id">ID</th>
          <th class="text-left px-4 py-2.5" data-sort="material">Material</th>
          <th class="text-left px-4 py-2.5" data-sort="sucursal">Sucursal</th>
          <th class="text-left px-4 py-2.5" data-sort="created_at">Fecha de carga</th>
          <th class="text-right px-4 py-2.5" data-sort="precio_clp_kg">Precio/kg</th>
          <th class="text-right px-4 py-2.5">Acciones</th>
        </tr>
      </thead>
      <tbody id="recibidosBody" class="divide-y divide-stone-100">
        <tr><td colspan="6" class="px-4 py-8 text-center text-stone-400">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
  <div id="recibidosPager"></div>
  <p class="text-xs text-stone-500 mt-3" id="recibidosInfo"></p>
</section>
