<!-- VISTA · Catálogo de materiales (tabla estática). CRUD simple, solo gerencia.
     Distinta de "Materiales y Precios": aquí se define QUÉ material existe, no cuánto vale.
     Los IDs los consume /controllers/catalogoController.js. -->
<section class="max-w-5xl mx-auto p-4 md:p-6">
  <header class="mb-4 flex flex-wrap items-start justify-between gap-3">
    <div>
      <h2 class="text-2xl font-bold text-stone-800 flex items-center gap-2"><span>📦</span><span>Catálogo de materiales</span></h2>
      <p class="text-sm text-stone-500 mt-1">
        Define qué materiales existen y cómo se llaman de cara al público.
        Los precios se gestionan aparte, en <b>Materiales y Precios</b>.
      </p>
    </div>
    <span id="catRolChip" class="chip off">cargando…</span>
  </header>

  <div id="catAviso" class="hidden mb-4 rounded-lg px-4 py-3 text-sm bg-amber-50 text-amber-800 border border-amber-200"></div>

  <div class="bg-white border border-stone-300 rounded-lg p-3 mb-4 flex flex-wrap items-center gap-2">
    <input id="catBuscar" type="search" placeholder="Buscar material…"
      class="border border-stone-300 rounded px-3 py-1.5 text-sm flex-1 min-w-[200px]">
    <label class="flex items-center gap-1 text-xs text-stone-600">
      <input type="checkbox" id="catVerInactivos"> Ver inactivos
    </label>
    <button id="catNuevo" class="bg-emerald-700 text-white px-3 py-1.5 rounded text-sm font-semibold">+ Nuevo material</button>
  </div>

  <div class="bg-white border border-stone-300 rounded-lg overflow-x-auto">
    <table class="w-full text-sm">
      <thead id="catHead" class="bg-stone-50 text-stone-500 text-xs uppercase tracking-wider select-none">
        <tr>
          <th class="text-left px-4 py-2.5" data-sort="nombre">Nombre interno</th>
          <th class="text-left px-4 py-2.5" data-sort="publico">Nombre público</th>
          <th class="text-left px-4 py-2.5" data-sort="categoria">Categoría</th>
          <th class="text-center px-4 py-2.5" data-sort="precios">Precios vigentes</th>
          <th class="text-right px-4 py-2.5">Acciones</th>
        </tr>
      </thead>
      <tbody id="catBody" class="divide-y divide-stone-100">
        <tr><td colspan="5" class="px-4 py-8 text-center text-stone-400">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
  <div id="catPager"></div>
  <p class="text-xs text-stone-500 mt-3" id="catInfo"></p>
</section>
