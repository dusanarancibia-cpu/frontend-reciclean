<!-- VISTA · Publicados. Absorbió a la antigua "Vitrina pública": en una sola pantalla se ve
     el precio vigente de cada material en cada sucursal Y se decide en qué web aparece.

     Por qué se fusionaron: publicar y ver lo publicado son la misma decisión de gerencia.
     Separadas, obligaban a cruzar dos pantallas para responder "¿esto ya está en la web
     y a cuánto?".

     Las columnas de sucursal se generan en tiempo de ejecución desde los datos
     (publicadosController.js), así que agregar una sucursal no requiere tocar este archivo.
     Los IDs los consume /controllers/publicadosController.js. -->
<section class="max-w-7xl mx-auto p-4 md:p-6">
  <header class="mb-4 flex flex-wrap items-start justify-between gap-3">
    <div>
      <h2 class="text-2xl font-bold text-stone-800 flex items-center gap-2"><span>🌐</span><span>Publicados</span></h2>
      <p class="text-sm text-stone-500 mt-1">
        Precio vigente de cada material en cada sucursal, y en qué web se muestra.
        Marcar una casilla lo publica <b>en esa web, en todas las sucursales que tengan precio</b>.
      </p>
    </div>
    <span id="publicadosRolChip" class="chip off">cargando…</span>
  </header>

  <div id="publicadosAviso" class="hidden mb-4 rounded-lg px-4 py-3 text-sm bg-amber-50 text-amber-800 border border-amber-200"></div>

  <div class="bg-white border border-stone-300 rounded-lg p-3 mb-4 flex flex-wrap items-center gap-2">
    <input id="publicadosBuscar" type="search" placeholder="Buscar material…"
      class="border border-stone-300 rounded px-3 py-1.5 text-sm flex-1 min-w-[200px]">
    <label class="text-xs text-stone-600">Sucursal
      <select id="publicadosSucursal" class="border border-stone-300 rounded px-2 py-1.5 text-sm bg-white ml-1">
        <option value="">Todas</option>
      </select>
    </label>
    <label class="flex items-center gap-1 text-xs text-stone-600">
      <input type="checkbox" id="publicadosSoloVisibles"> Solo los que están en alguna web
    </label>
    <button id="publicadosExpandir" class="bg-white border border-stone-300 text-stone-600 px-3 py-1.5 rounded text-sm font-medium">Expandir/plegar</button>
    <button id="publicadosExportar" class="bg-white border border-stone-300 text-stone-700 px-3 py-1.5 rounded text-sm font-medium">⬇ Exportar CSV</button>
    <!-- Solo gerencia. El controlador lo muestra; el RPC revalida el rol en el servidor,
         así que ocultarlo es comodidad, no seguridad. -->
    <button id="publicadosReiniciar" class="hidden bg-white border border-rose-300 text-rose-700 px-3 py-1.5 rounded text-sm font-semibold ml-auto">
      ♻️ Reiniciar precios
    </button>
  </div>

  <p class="text-xs text-stone-500 mb-2" id="publicadosLeyenda">
    En la cabecera de cada categoría puedes publicar o quitar <b>toda la categoría</b> de una web de un solo clic.
  </p>

  <!-- El acordeón por categoría se monta aquí. -->
  <div id="publicadosAcc"></div>

  <p class="text-xs text-stone-500 mt-3" id="publicadosInfo"></p>
  <p class="text-xs text-stone-500 mt-1" id="publicadosResumen"></p>
</section>
