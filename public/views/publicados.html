<!-- VISTA · Publicados. Precios oficiales vigentes: lo que ven las webs y el chatbot.
     El precio mostrado es el PUBLICADO (lo que le pagamos a la gente).
     Los IDs los consume /controllers/publicadosController.js. -->
<section class="max-w-5xl mx-auto p-4 md:p-6">
  <header class="mb-4">
    <h2 class="text-2xl font-bold text-stone-800 flex items-center gap-2"><span>🌐</span><span>Publicados</span></h2>
    <p class="text-sm text-stone-500 mt-1">
      Precios oficiales vigentes. Es lo que le pagamos a la gente y lo que ven las webs públicas.
      Para que un material aparezca en la web debe estar activo además en <b>Vitrina pública</b>.
    </p>
  </header>

  <div class="bg-white border border-stone-300 rounded-lg p-3 mb-4 flex flex-wrap items-center gap-2">
    <input id="publicadosBuscar" type="search" placeholder="Buscar por material, sucursal, precio…"
      class="border border-stone-300 rounded px-3 py-1.5 text-sm flex-1 min-w-[220px]">
  </div>

  <div class="bg-white border border-stone-300 rounded-lg overflow-x-auto">
    <table class="w-full text-sm">
      <thead id="publicadosHead" class="bg-stone-50 text-stone-500 text-xs uppercase tracking-wider select-none">
        <tr>
          <th class="text-left px-4 py-2.5" data-sort="material">Material</th>
          <th class="text-left px-4 py-2.5" data-sort="sucursal">Sucursal</th>
          <th class="text-right px-4 py-2.5" data-sort="precio">Precio publicado</th>
          <th class="text-left px-4 py-2.5" data-sort="vigencia">Vigencia</th>
          <th class="text-right px-4 py-2.5">Acciones</th>
        </tr>
      </thead>
      <tbody id="publicadosBody" class="divide-y divide-stone-100">
        <tr><td colspan="5" class="px-4 py-8 text-center text-stone-400">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
  <div id="publicadosPager"></div>
  <p class="text-xs text-stone-500 mt-3" id="publicadosInfo"></p>
</section>
