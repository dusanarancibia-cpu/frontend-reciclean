<!-- VISTA · Revisión. Paso previo a publicar: aquí gerencia ve lo que salió de la Calculadora
     (estado 'revision') y hace la aprobación final. Cada fila abre un Modal de Detalle Completo.
     Los IDs los consume /controllers/revisionController.js. -->
<section class="w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
  <header class="mb-4 flex flex-wrap items-start justify-between gap-3">
    <div>
      <h2 class="text-2xl font-bold text-stone-800">Revisión y Aprobación Final</h2>
      <p class="text-sm text-stone-500 mt-1">
        Precios calculados a la espera de aprobación. Revisa el detalle de cada uno y, al aprobar,
        recién se publican en la vitrina web.
      </p>
    </div>
    <span id="revRolChip" class="chip off">cargando…</span>
  </header>

  <div id="revAviso" class="hidden mb-4 rounded-lg px-4 py-3 text-sm bg-amber-50 text-amber-800 border border-amber-200"></div>

  <div class="bg-white border border-stone-300 rounded-lg p-3 mb-4 flex flex-wrap items-center gap-2">
    <input id="revBuscar" type="search" placeholder="Buscar material, empresa o sucursal…"
      class="border border-stone-300 rounded px-3 py-1.5 text-sm flex-1 min-w-[220px]">
    <button id="btnAprobarSel" class="bg-emerald-700 hover:bg-emerald-800 text-white px-4 py-2 rounded text-sm font-semibold disabled:opacity-50" disabled>
      Aprobar seleccionados (<span id="revSelCount">0</span>)
    </button>
    <span id="revResumen" class="text-xs text-stone-500"></span>
  </div>

  <div class="bg-white border border-stone-300 rounded-lg overflow-x-auto">
    <table class="w-full text-sm">
      <thead id="revHead" class="bg-stone-50 text-stone-500 text-xs uppercase tracking-wider select-none">
        <tr>
          <th class="px-3 py-2.5 w-10"><input type="checkbox" id="revSelAll" aria-label="Seleccionar todo"></th>
          <th class="text-left px-4 py-2.5" data-sort="material">Material</th>
          <th class="text-left px-4 py-2.5" data-sort="empresa">Empresa / Cliente</th>
          <th class="text-left px-4 py-2.5" data-sort="sucursal">Sucursal</th>
          <th class="text-right px-4 py-2.5" data-sort="recibido">Nos pagan</th>
          <th class="text-right px-4 py-2.5" data-sort="lista">P. Lista</th>
          <th class="text-right px-4 py-2.5">Acciones</th>
        </tr>
      </thead>
      <tbody id="revBody" class="divide-y divide-stone-100">
        <tr><td colspan="7" class="px-4 py-8 text-center text-stone-400">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
  <div id="revPager"></div>
  <p class="text-xs text-stone-500 mt-3" id="revInfo"></p>
</section>
