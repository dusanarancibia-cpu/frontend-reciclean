<!-- VISTA · Historial de precios. Auditoría de variaciones: quién cambió qué precio, cuándo,
     de cuánto a cuánto y en qué sucursal. Es solo lectura y su fin es la trazabilidad.
     Los IDs los consume /controllers/historialController.js. -->
<section class="w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
  <header class="mb-4">
    <h2 class="text-2xl font-bold text-stone-800">Historial y Auditoría de Precios</h2>
    <p class="text-sm text-stone-500 mt-1">
      Cada cambio de precio queda registrado: alta, subida, bajada o retiro. Sirve para auditar
      y, más adelante, graficar la fluctuación de cada material.
    </p>
  </header>

  <!-- KPIs de fluctuación. La estructura ya queda lista para enchufar un gráfico. -->
  <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4">
    <div class="bg-white border border-stone-300 rounded-lg p-3"><div class="text-xs text-stone-500 uppercase tracking-wider">Cambios</div><div class="text-2xl font-bold text-stone-800 mt-1" id="hisKpiTotal">—</div></div>
    <div class="bg-white border border-stone-300 rounded-lg p-3"><div class="text-xs text-stone-500 uppercase tracking-wider">Altas</div><div class="text-2xl font-bold text-sky-700 mt-1" id="hisKpiAltas">—</div></div>
    <div class="bg-white border border-stone-300 rounded-lg p-3"><div class="text-xs text-stone-500 uppercase tracking-wider">Subidas</div><div class="text-2xl font-bold text-emerald-700 mt-1" id="hisKpiSubas">—</div></div>
    <div class="bg-white border border-stone-300 rounded-lg p-3"><div class="text-xs text-stone-500 uppercase tracking-wider">Bajadas</div><div class="text-2xl font-bold text-amber-700 mt-1" id="hisKpiBajas">—</div></div>
    <div class="bg-white border border-stone-300 rounded-lg p-3"><div class="text-xs text-stone-500 uppercase tracking-wider">Retiros</div><div class="text-2xl font-bold text-rose-700 mt-1" id="hisKpiRetiros">—</div></div>
  </div>

  <div class="bg-white border border-stone-300 rounded-lg p-3 mb-4 flex flex-wrap items-center gap-2">
    <input id="hisBuscar" type="search" placeholder="Buscar por material, usuario o sucursal…"
      class="border border-stone-300 rounded px-3 py-1.5 text-sm flex-1 min-w-[220px]">
    <select id="hisVariacion" class="border border-stone-300 rounded px-2 py-1.5 text-sm bg-white">
      <option value="">Todas las variaciones</option>
      <option value="alta">Altas</option>
      <option value="sube">Subidas</option>
      <option value="baja">Bajadas</option>
      <option value="retiro">Retiros</option>
    </select>
    <!-- Estado del precio: activo = sigue vigente en la web; inactivo = ya fue reemplazado
         (se le puso vigencia_hasta al publicar uno nuevo) y quedó como histórico. -->
    <select id="hisEstado" class="border border-stone-300 rounded px-2 py-1.5 text-sm bg-white" title="Filtra por si el precio de esa fila sigue vigente o ya fue reemplazado">
      <option value="">Todos</option>
      <option value="activo">Solo Activos</option>
      <option value="inactivo">Solo Inactivos (Históricos)</option>
    </select>
    <button id="hisExpandir" class="bg-white border border-stone-300 text-stone-600 px-3 py-1.5 rounded text-sm font-medium">Expandir/plegar</button>
    <button id="hisExportar" class="bg-white border border-stone-300 text-stone-700 px-3 py-1.5 rounded text-sm font-medium">Exportar CSV</button>
    <span id="hisResumen" class="text-xs text-stone-500"></span>
  </div>

  <!-- Acordeón por categoría; cada categoría lista sus cambios de precio (más recientes arriba). -->
  <div id="hisAcc"></div>
  <p class="text-xs text-stone-500 mt-3" id="hisInfo"></p>
</section>
