<!-- VISTA · Propuestas (stub). Recomendaciones de la IA, filtrables por confianza.
     Fuente futura: staging.precios_propuestos (ruta Diego = referencia). -->
<section class="max-w-5xl mx-auto p-4 md:p-6">
  <header class="mb-4 flex flex-wrap items-start justify-between gap-3">
    <div>
      <h2 class="text-2xl font-bold text-stone-800">Propuestas</h2>
      <p class="text-sm text-stone-500 mt-1">Recomendaciones de precio generadas por la IA, ordenadas por confianza.</p>
    </div>
    <label class="text-xs text-stone-600 flex items-center gap-2">
      Confianza mínima
      <select id="propFiltroConf" class="border border-stone-300 rounded px-2 py-1.5 text-sm bg-white">
        <option value="0">Todas</option>
        <option value="0.85" selected>≥ 0.85 (Diego)</option>
        <option value="1">= 1.00 (Dusan)</option>
      </select>
    </label>
  </header>

  <div class="bg-white border border-stone-300 rounded-lg overflow-x-auto">
    <table class="w-full text-sm">
      <thead id="propuestasHead" class="bg-stone-50 text-stone-500 text-xs uppercase tracking-wider select-none">
        <tr>
          <th class="text-left px-4 py-2.5" data-sort="material">Material</th>
          <th class="text-left px-4 py-2.5" data-sort="sucursal">Sucursal</th>
          <th class="text-right px-4 py-2.5" data-sort="precio_clp_kg">Precio propuesto</th>
          <th class="text-right px-4 py-2.5" data-sort="confidence_score">Confianza</th>
          <th class="text-left px-4 py-2.5" data-sort="origen">Origen</th>
          <th class="text-right px-4 py-2.5">Acción</th>
        </tr>
      </thead>
      <tbody id="propuestasBody" class="divide-y divide-stone-100">
        <tr><td colspan="6" class="px-4 py-8 text-center text-stone-400">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
  <div id="propuestasPager"></div>
  <p class="text-xs text-stone-500 mt-3" id="propuestasInfo"></p>
</section>
